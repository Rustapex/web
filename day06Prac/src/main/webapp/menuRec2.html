<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	span{
		color: blue;
	}

</style>
</head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
<script>
	function getData(){
		$.ajax({
			
			type : "get",
			url : "/day06Prac/food2", 
			success : function(data){
				console.log(data);
				
//				$("#result").html("<p>" + data.name + data.price+ "</p>");
			let resultData = `<p><span>${data.name}</span><span>${data.price}</span></p>`;
			$("#result").html(resultData);
				
				//document.getElementById("result").innerHTML=data;
				
			},
			error : function(error){
				console.log(error);
			} 
		});
	}
</script>
<body>

<button onclick="getData()">메뉴 추천하기</button>

<div id="result">
		11111111
</div>
</body>
</html>
