<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
 
<script>

	/* 서버와 비동기 통신을 하는 jquery ajax() 메서드 이해하기
	기능 : 
	입력 : 서버와 통신에 필요한 정보 제공, => 객체로 전달 받는다.
	
	*/
	function myAjax( obj ){   
		
		
		 
		 //실제서버와의 통신을 수행함
		 
		 
		 setTimeout(() => {
			
			 
			 //서버와 통신 시간
			 
			 let type  =  obj.type; //get(가져온), post(등록), put(수정), delete(삭제)
			 let dateType = obj.dataType;
			 let  url  = obj.url;
			 let food="볶음밥입니다";
			 
			 // 실제 서버와 비동기 통신을 수행
			 // 성공, 실패
			 
			 
			 let  result= true;
			 if( result ) {
			        obj.success(food);
			 }
			 else{
			        obj.error();
			 } 
			 
			 
			 
			 
		}, 3000);
		 
		
	}	
	
	
	function send(){
		
		   //myAjax 호출하기
		
			myAjax(
					{
					  	type: "get",
						dataType: "text" ,
						url: "/food0"  ,			// 절대 경로로 적어야
						success: function( data){ 	// 성공 시 function(data) 실행
							  alert(data);			 				
						},
						error: function( err ){		// 실패 시 function(err) 실행
							 //
							 alert("요청에 실패했습니다");
						}				 
			       }	 
			 );	 
	}
</script>

</head>
<body>
	
	<button onclick="send()">음식정보</button>
	
	 

</body>
</html>
